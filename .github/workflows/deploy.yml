name: Deploy

on:
  push:
    branches: [master]

jobs:
  # ── Gate: must pass before anything deploys ─────────────────────────────────
  checks:
    name: Type check & unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Backend type check
        run: npm run check
        working-directory: backend

      - name: Backend unit tests
        run: npm test
        working-directory: backend
        env:
          NASA_API_KEY: DEMO_KEY
          FRONTEND_ORIGIN: http://localhost:5173

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Frontend type check
        run: npm run check
        working-directory: frontend

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy backend + frontend
    runs-on: ubuntu-latest
    needs: checks
    outputs:
      frontend_url: https://cosmo-view.vercel.app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      # Trigger Render backend deploy (async — we'll poll health below)
      - name: Trigger Render deploy
        run: curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      # Deploy frontend to Vercel (synchronous — waits for completion)
      - name: Deploy frontend to Vercel
        run: |
          npx vercel --prod \
            --token "$VERCEL_TOKEN" \
            --yes \
            --cwd frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Poll Render health until the new deploy is live (max 3 min)
      - name: Wait for Render backend to be healthy
        run: |
          echo "Polling https://cosmoview.onrender.com/api/v1/health ..."
          for i in $(seq 1 18); do
            STATUS=$(curl -sf https://cosmoview.onrender.com/api/v1/health | jq -r '.data.status' 2>/dev/null || echo "")
            if [ "$STATUS" = "ok" ]; then
              echo "Backend healthy after $((i * 10))s"
              exit 0
            fi
            echo "Attempt $i/18 — not ready yet, waiting 10s..."
            sleep 10
          done
          echo "Backend did not become healthy within 3 minutes"
          exit 1

  # ── E2E smoke tests against production ──────────────────────────────────────
  e2e:
    name: E2E tests (production)
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run E2E tests against production
        run: npx playwright test --project=chromium
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: https://cosmo-view.vercel.app
          CI: true

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
